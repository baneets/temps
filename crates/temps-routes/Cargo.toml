[package]
name = "temps-routes"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true

[dependencies]
temps-core = { path = "../temps-core" }
temps-database = { path = "../temps-database" }
temps-entities = { path = "../temps-entities" }

# Database
sea-orm = { workspace = true }
sea-orm-migration = { workspace = true }
sqlx = { workspace = true }

# Concurrency
parking_lot = "0.12"

# Logging
tracing = { workspace = true }
anyhow = { workspace = true }

# Async
tokio = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# HTTP for the internal route-sync endpoint that workers long-poll
# against. Same wire model as `temps-dns::handlers::dns_sync`.
axum = { workspace = true }
http = { workspace = true }
sha2 = { workspace = true }
hex = { workspace = true }
async-trait = { workspace = true }
chrono = { workspace = true }

# Constant-time byte comparison for the per-node bearer-token hash check.
# Same crate already pulled in by temps-revenue.
subtle = "2.6"
