[package]
name = "temps-proxy"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true

[dependencies]
temps-analytics = { path = "../temps-analytics" }
temps-audit = { path = "../temps-audit" }
temps-auth = { path = "../temps-auth" }
temps-config = { path = "../temps-config" }
temps-core = { path = "../temps-core" }
temps-database = { path = "../temps-database" }
temps-entities = { path = "../temps-entities" }
temps-file-store = { path = "../temps-file-store" }
temps-geo = { path = "../temps-geo" }
temps-routes = { path = "../temps-routes" }
temps-metrics = { path = "../temps-metrics" }
temps-migrations = { path = "../temps-migrations" }
serde = { workspace = true }
tokio = { workspace = true }
async-trait = { workspace = true }
axum = { workspace = true }
bytes = { workspace = true }
cookie = { workspace = true }
sea-orm = { workspace = true }
sea-orm-migration = { workspace = true }
flate2 = { workspace = true }
tracing = { workspace = true }
memchr = "2.7"
htmd = "0.5"
scraper = "0.27"
pingora = { version = "0.8.0", features = ["lb"] }
pingora-core = { version = "0.8.0", features = ["openssl", "connection_filter"] }
pingora-http = "0.8.0"
pingora-load-balancing = "0.8.0"
pingora-proxy = "0.8.0"
pingora-openssl = "0.8.0"
rand = { workspace = true }
hex = "0.4"
sha2 = "0.11"
hmac = "0.13"
argon2 = { workspace = true }
serde_json = { workspace = true }
uuid = { workspace = true }
mime_guess = "2.0"
chrono = { workspace = true }
clickhouse = { version = "0.15", features = ["uuid", "chrono"] }
thiserror = { workspace = true }
base64 = { workspace = true }
anyhow = { workspace = true }
utoipa = { workspace = true }
sqlx = { version = "0.9", features = ["postgres", "runtime-tokio"] }
dashmap = "6"
futures = { workspace = true }
parking_lot = "0.12"
arc-swap = "1"
moka = { version = "0.12", features = ["future"] }
ipnetwork = "0.21"
regex = { workspace = true }
reqwest = { workspace = true }
once_cell = { workspace = true }
woothee = "0.13"
rustls = "0.23"
rustls-pemfile = "2.0"
openssl = "0.10"
url = { workspace = true }

[features]
# Enable DB-backed integration tests (require a running PostgreSQL instance)
integration = []

[dev-dependencies]
tokio-test = "0.4"
testcontainers = { workspace = true, features = ["http_wait_plain"] }
temp-dir = "0.2"
hyper = { version = "1.0", features = ["full"] }
hyper-util = { version = "0.1", features = ["full"] }
http-body-util = { workspace = true }
tower = "0.4"
anyhow = "1.0"
lazy_static = "1.4"
temps-presets = { path = "../temps-presets" }
# Uses the workspace 0.14.8; tls_cert_loader.rs was migrated to the 0.14
# `Issuer`/`signing_key` API in #250 (merged from main), so the earlier
# 0.13.2 pin (matching temps-core's) is no longer needed.
rcgen = { workspace = true }
