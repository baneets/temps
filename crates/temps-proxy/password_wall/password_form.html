<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Required - {{PROJECT_NAME}}</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap');

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #09090b;
            color: #fafafa;
            overflow: hidden;
        }

        /* Subtle radial glow behind the card */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 600px 400px at 50% 45%, rgba(59,130,246,0.06) 0%, transparent 70%),
                radial-gradient(ellipse 300px 300px at 30% 60%, rgba(99,102,241,0.04) 0%, transparent 60%);
            pointer-events: none;
        }

        .card {
            position: relative;
            width: 100%;
            max-width: 420px;
            margin: 20px;
            padding: 40px 32px 36px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.06);
            background: linear-gradient(165deg, rgba(24,24,27,0.95) 0%, rgba(15,15,18,0.98) 100%);
            backdrop-filter: blur(20px);
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.03),
                0 20px 50px -12px rgba(0,0,0,0.6),
                0 0 80px -20px rgba(59,130,246,0.08);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1) 30%, rgba(255,255,255,0.1) 70%, transparent);
            border-radius: 16px 16px 0 0;
        }

        /* Shield icon */
        .icon-wrap {
            width: 52px;
            height: 52px;
            margin: 0 auto 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            background: rgba(59,130,246,0.08);
            border: 1px solid rgba(59,130,246,0.12);
        }

        .icon-wrap svg {
            width: 24px;
            height: 24px;
            stroke: #60a5fa;
            fill: none;
            stroke-width: 1.75;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Context badge */
        .context {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-bottom: 20px;
        }

        .context-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.01em;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            color: #a1a1aa;
        }

        .context-badge .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #3b82f6;
            flex-shrink: 0;
        }

        .context-sep {
            color: #3f3f46;
            font-size: 0.7rem;
        }

        .env-badge {
            background: rgba(59,130,246,0.06);
            border-color: rgba(59,130,246,0.12);
            color: #93c5fd;
        }

        h1 {
            font-size: 1.35rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 6px;
            color: #fafafa;
            letter-spacing: -0.02em;
        }

        .subtitle {
            text-align: center;
            font-size: 0.85rem;
            color: #71717a;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-group {
            position: relative;
        }

        input[type="password"] {
            width: 100%;
            padding: 13px 16px;
            border-radius: 10px;
            border: 1px solid #27272a;
            background: rgba(9,9,11,0.6);
            color: #fafafa;
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input[type="password"]::placeholder {
            color: #52525b;
        }

        input[type="password"]:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1), 0 0 20px -5px rgba(59,130,246,0.15);
        }

        input[type="password"].input-error {
            border-color: #ef4444;
            box-shadow: 0 0 0 3px rgba(239,68,68,0.08);
        }

        input[type="password"].input-error:focus {
            border-color: #ef4444;
            box-shadow: 0 0 0 3px rgba(239,68,68,0.12), 0 0 20px -5px rgba(239,68,68,0.1);
        }

        button[type="submit"] {
            width: 100%;
            padding: 13px;
            border-radius: 10px;
            border: none;
            background: #3b82f6;
            color: #fff;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 550;
            cursor: pointer;
            transition: background 0.15s ease, transform 0.1s ease, box-shadow 0.15s ease;
            letter-spacing: 0.01em;
        }

        button[type="submit"]:hover {
            background: #2563eb;
            box-shadow: 0 4px 16px -4px rgba(59,130,246,0.4);
        }

        button[type="submit"]:active {
            background: #1d4ed8;
            transform: scale(0.985);
        }

        .error-msg {
            display: {{ERROR_DISPLAY}};
            align-items: center;
            gap: 6px;
            padding: 10px 12px;
            border-radius: 8px;
            background: rgba(239,68,68,0.06);
            border: 1px solid rgba(239,68,68,0.12);
            color: #fca5a5;
            font-size: 0.8rem;
            line-height: 1.4;
        }

        .error-msg svg {
            width: 15px;
            height: 15px;
            stroke: #f87171;
            fill: none;
            stroke-width: 2;
            flex-shrink: 0;
        }

        .footer {
            margin-top: 28px;
            text-align: center;
            font-size: 0.7rem;
            color: #3f3f46;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon-wrap">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                <path d="M9 12l2 2 4-4"/>
            </svg>
        </div>

        <div class="context">
            <span class="context-badge">
                <span class="dot"></span>
                {{PROJECT_NAME}}
            </span>
            <span class="context-sep">/</span>
            <span class="context-badge env-badge">{{ENVIRONMENT_NAME}}</span>
        </div>

        <h1>Password Required</h1>
        <p class="subtitle">This environment is protected. Enter the password to continue.</p>

        <div class="error-msg">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <span>Incorrect password. Please try again.</span>
        </div>

        <form method="POST" action="/_temps/password-verify">
            <input type="hidden" name="redirect" value="{{REDIRECT_PATH}}">
            <div class="input-group">
                <input type="password" name="password" placeholder="Enter password" autofocus required class="{{ERROR_INPUT_CLASS}}">
            </div>
            <button type="submit">Continue</button>
        </form>

        <div class="footer">Protected by Temps</div>
    </div>
</body>
</html>
