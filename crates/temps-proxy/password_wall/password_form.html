<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Required</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; background: #0f172a; color: #e2e8f0;
        }
        .container {
            width: 100%; max-width: 400px; padding: 40px 24px; text-align: center;
        }
        .lock-icon {
            width: 48px; height: 48px; margin: 0 auto 24px;
            stroke: #94a3b8; fill: none; stroke-width: 1.5;
        }
        h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 8px; color: #f1f5f9; }
        p { font-size: 0.875rem; color: #64748b; margin-bottom: 24px; line-height: 1.5; }
        form { display: flex; flex-direction: column; gap: 12px; }
        input[type="password"] {
            width: 100%; padding: 12px 16px; border-radius: 8px;
            border: 1px solid #334155; background: #1e293b; color: #f1f5f9;
            font-size: 0.95rem; outline: none; transition: border-color 0.2s;
        }
        input[type="password"]:focus { border-color: #3b82f6; }
        input[type="password"]::placeholder { color: #475569; }
        button {
            width: 100%; padding: 12px; border-radius: 8px; border: none;
            background: #3b82f6; color: #fff; font-size: 0.95rem;
            font-weight: 500; cursor: pointer; transition: background 0.2s;
        }
        button:hover { background: #2563eb; }
        button:active { background: #1d4ed8; }
        .error {
            color: #f87171; font-size: 0.85rem; margin-top: 4px;
            display: none;
        }
        .error.visible { display: block; }
        .powered-by {
            margin-top: 32px; font-size: 0.75rem; color: #475569;
        }
    </style>
</head>
<body>
    <div class="container">
        <svg class="lock-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <h1>Password Required</h1>
        <p>This environment is password-protected. Enter the password to continue.</p>
        <form method="POST" action="/_temps/password-verify">
            <input type="hidden" name="redirect" value="{{REDIRECT_PATH}}">
            <input type="password" name="password" placeholder="Enter password" autofocus required>
            <button type="submit">Continue</button>
        </form>
        <div id="error" class="error">Incorrect password. Please try again.</div>
        <div class="powered-by">Protected by Temps</div>
    </div>
    <script>
        if (window.location.search.includes('error=1')) {
            document.getElementById('error').classList.add('visible');
        }
    </script>
</body>
</html>
