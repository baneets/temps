[package]
name = "temps-git-credential"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "temps-git-credential-helper"
path = "src/bin/helper.rs"

[[bin]]
name = "temps-git-credential-daemon"
path = "src/bin/daemon.rs"

[lib]
path = "src/lib.rs"

# Standalone deps — kept in lockstep with the workspace's Cargo.toml so
# the sandbox image build context doesn't have to carry the whole
# 70-crate workspace into Docker. Bump in lockstep when bumping upstream.
[dependencies]
tokio = { version = "1.47.1", features = ["full"] }
serde = { version = "=1.0.228", features = ["derive"] }
serde_json = "1.0.140"
thiserror = "2.0.17"
tracing = "0.1.40"
tracing-subscriber = { version = "0.3.18", features = ["env-filter", "std", "fmt"] }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }
chrono = { version = "0.4", features = ["serde"] }
nix = { version = "0.29", features = ["socket", "user"] }

[profile.release]
lto = "thin"
codegen-units = 1
strip = "symbols"
