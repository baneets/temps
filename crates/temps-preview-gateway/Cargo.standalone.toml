## Standalone manifest used inside the Docker build only. The in-tree
## Cargo.toml uses workspace inheritance which doesn't work outside the
## monorepo. Keep dependency versions roughly aligned with the workspace.

[package]
name = "temps-preview-gateway"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"

[[bin]]
name = "temps-preview-gateway"
path = "src/main.rs"

[dependencies]
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow = "1"

[profile.release]
lto = "thin"
strip = true
codegen-units = 1
