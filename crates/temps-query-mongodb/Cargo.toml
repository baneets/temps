[package]
name = "temps-query-mongodb"
version = "0.1.0"
edition = "2021"

[dependencies]
temps-query = { path = "../temps-query" }

# MongoDB driver - use bson-3 feature so mongodb::bson re-exports bson 3.x,
# matching our explicit bson = "3.1" dep and avoiding a two-version conflict.
# The default compat-3-0-0 feature enables bson-2 which we explicitly exclude.
mongodb = { version = "3.7.0", default-features = false, features = ["bson-3", "compat-3-3-0", "rustls-tls", "dns-resolver"] }

# Async runtime
tokio = { version = "1", features = ["full"] }

# Error handling
thiserror = "2.0"
anyhow = "1.0"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bson = "3.1"

# Logging
tracing = "0.1"

# Async trait
async-trait = "0.1"

# Date/time
chrono = { version = "0.4", features = ["serde"] }
