[package]
name = "temps-pty-agent"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true

[[bin]]
name = "temps-pty-agent"
path = "src/main.rs"

[lib]
path = "src/lib.rs"

[dependencies]
tokio = { workspace = true }
tokio-util = { workspace = true }
futures = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
clap = { workspace = true }
bytes = { workspace = true }

# PTY handling. nix gives us openpty + ioctl(TIOCSWINSZ) for resize, and
# libc signals. Linux-only — that's fine, the sandbox is always Linux.
nix = { version = "0.29", features = ["fs", "ioctl", "process", "signal", "term", "poll"] }

[target.'cfg(unix)'.dependencies]
libc = "0.2"
