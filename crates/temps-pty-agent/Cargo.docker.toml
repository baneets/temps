[package]
name = "temps-pty-agent"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "temps-pty-agent"
path = "src/main.rs"

[lib]
path = "src/lib.rs"

# Standalone dependency versions pinned to match the main workspace's
# Cargo.toml. Kept here so the sandbox image can build the agent binary
# without carrying the whole 50-crate workspace into the build context.
# Bump in lockstep with the workspace when bumping upstream versions.
[dependencies]
tokio = { version = "1.47.1", features = ["full"] }
tokio-util = { version = "0.7", features = ["codec"] }
futures = "0.3.31"
serde = { version = "=1.0.228", features = ["derive", "rc"] }
serde_json = "1.0.140"
thiserror = "2.0.17"
tracing = "0.1.40"
tracing-subscriber = { version = "0.3.18", features = ["env-filter", "std", "fmt", "registry"] }
clap = { version = "4.4", features = ["derive", "env"] }
bytes = "1.11.1"
nix = { version = "0.29", features = ["fs", "ioctl", "process", "signal", "term", "poll"] }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[profile.release]
lto = "thin"
codegen-units = 1
strip = "symbols"
