# Temps Project Templates Configuration
# =====================================
# This file defines curated project templates that users can use to quickly
# create new projects with pre-configured services, environment variables,
# and deployment settings.

version: "1"

templates:
  # Observability Starter — the one-click "try Temps" demo app.
  # Showcases all four built-in observability pillars (analytics, error
  # tracking, distributed tracing) plus a Postgres database in a single deploy,
  # so a new user can activate without building a project of their own first.
  - slug: observability-starter
    name: Observability Starter
    description: A Next.js demo app pre-wired with analytics, error tracking, distributed tracing, and a Postgres database — see Temps in action in one deploy
    git:
      url: https://github.com/gotempsh/temps-examples.git
      ref: main
      subfolder: examples/observability-starter
    preset: nextjs
    # Prebuilt image published by CI in gotempsh/temps-examples. When set, the
    # one-click deploy pulls and runs this image directly (instant, no BuildKit);
    # the `git` block above remains the build-from-source fallback.
    image: ghcr.io/gotempsh/observability-starter:latest
    exposed_port: 3000
    health_check_path: /
    tags:
      - demo
      - nextjs
      - observability
      - analytics
      - getting-started
    features:
      - Product analytics with @temps-sdk/react-analytics
      - Error tracking via Sentry-compatible DSN
      - Distributed tracing with OpenTelemetry
      - Postgres-backed guestbook
      - Session recording on errors
    services:
      - postgres
    env_vars:
      # All of these are sourced from the Temps project itself (Error Tracking /
      # Monitoring settings), not user secrets, so they're optional — the app
      # builds and runs without them and lights each pillar up as you fill them in.
      - name: SENTRY_DSN
        description: Server-side error tracking DSN. Copy from Project → Error Tracking → DSN & Setup.
        example: https://<key>@<host>/<project>
        required: false
      - name: NEXT_PUBLIC_SENTRY_DSN
        description: Browser error tracking DSN (safe to expose). Same value as SENTRY_DSN.
        example: https://<key>@<host>/<project>
        required: false
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        description: OpenTelemetry traces ingestion endpoint. Copy from Project → Monitoring.
        example: https://your-app.temps.sh/api/otel/v1/traces
        required: false
      - name: OTEL_EXPORTER_OTLP_TOKEN
        description: Bearer token for the OTLP endpoint. Copy from Project → Monitoring.
        required: false
    is_public: true
    is_featured: true
    sort_order: 0

  # Next.js SaaS Starter
  - slug: nextjs-saas-starter
    name: Next.js SaaS Starter
    description: A complete SaaS starter kit with authentication, billing, and database integration
    git:
      url: https://github.com/gotempsh/temps-examples.git
      ref: main
      subfolder: examples/nextjs-saas
    preset: nextjs
    tags:
      - saas
      - nextjs
      - typescript
      - fullstack
    features:
      - Authentication with NextAuth.js
      - Stripe subscription billing
      - PostgreSQL database with Prisma
      - Tailwind CSS styling
      - Dark mode support
    services:
      - postgres
    env_vars:
      - name: NEXTAUTH_SECRET
        description: Secret for NextAuth.js sessions
        required: true
        default_generator: random_hex_32
      - name: NEXTAUTH_URL
        description: Base URL for authentication callbacks
        example: https://your-app.temps.sh
        required: true
        default_generator: app_url
      - name: STRIPE_SECRET_KEY
        description: Stripe secret API key
        example: sk_test_...
        required: true
      - name: STRIPE_WEBHOOK_SECRET
        description: Stripe webhook signing secret
        example: whsec_...
        required: true
      - name: STRIPE_PRICE_ID
        description: Stripe price ID for subscription
        example: price_...
        required: true
    is_public: true
    is_featured: true
    sort_order: 1

  # Next.js Documentation Template
  - slug: nextjs-docs-template
    name: Next.js Docs Template
    description: A modern documentation site template with syntax highlighting, dark mode, and responsive design
    git:
      url: https://github.com/gotempsh/temps-examples.git
      ref: main
      subfolder: examples/docs-template
    preset: nextjs
    tags:
      - docs
      - nextjs
      - typescript
      - tailwind
      - documentation
    features:
      - Shiki syntax highlighting
      - Dark mode with next-themes
      - Radix UI components
      - Tailwind CSS v4 styling
      - Responsive documentation layout
    services: []
    env_vars: []
    is_public: true
    is_featured: false
    sort_order: 2
