# Local 3-worker Temps cluster for distributed dev.
#
# Topology:
#
#   ┌──────────────── temps-underlay (10.42.0.0/24, this is the "VPC") ────────────────┐
#   │                                                                                  │
#   │  ┌── postgres ──────────┐  ┌── control-plane ─────────┐                          │
#   │  │ TimescaleDB pg18     │  │ DinD + temps serve       │                          │
#   │  │ 10.42.0.5            │  │ 10.42.0.10               │                          │
#   │  │ port 5432 (internal) │  │ host port 8080 → 8080    │                          │
#   │  └──────────────────────┘  └──────────────────────────┘                          │
#   │                                                                                  │
#   │  ┌── worker-1 ──────────┐  ┌── worker-2 ──────────┐  ┌── worker-3 ──────────┐    │
#   │  │ DinD + temps agent   │  │ DinD + temps agent   │  │ DinD + temps agent   │    │
#   │  │ 10.42.0.21           │  │ 10.42.0.22           │  │ 10.42.0.23           │    │
#   │  └──────────────────────┘  └──────────────────────┘  └──────────────────────┘    │
#   │                                                                                  │
#   └──────────────────────────────────────────────────────────────────────────────────┘
#
# Each worker is a privileged container running its own dockerd + the
# Temps agent. The compute_cidr allocator carves out 172.20.x.0/24 from
# the configured pool, one slice per worker. Cross-node traffic flows
# over a VXLAN tunnel pinned to the underlay IPs above.
#
# The temps source tree is mounted read-write at /workspace in every
# DinD container so all containers share the same target/ cache. After a
# `cargo build --bin temps` inside any container the new binary is
# instantly visible everywhere.

name: temps-dev-cluster

networks:
  underlay:
    name: temps-underlay
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 10.42.0.0/24

volumes:
  postgres-data:
    name: temps-dev-postgres-data
  cargo-cache:
    name: temps-dev-cargo-cache
  # Cargo's git-dep cache (cloned source for `git = ...` Cargo.toml deps
  # like cloudflare-rs and getsentry/relay). Without a persistent mount
  # here, cargo re-clones every git dep — including submodules in the
  # Sentry relay repo — on every `cargo build` run from a fresh
  # container, which can take minutes.
  cargo-git:
    name: temps-dev-cargo-git
  # Shared workspace `target/` directory. CRITICAL: this MUST be a named
  # Docker volume (not part of the /workspace bind mount), because:
  #   1. The bind mount serves macOS source files into the container
  #      via gRPC FUSE / VirtioFS, which has loose mtime semantics that
  #      defeat cargo's fingerprint cache.
  #   2. The host already has a `target/` from native macOS builds
  #      (Mach-O binaries). Mixing those with Linux ELF artifacts in
  #      the same directory tree confuses cargo and causes spurious
  #      full rebuilds.
  # By mounting this named volume *over* /workspace/target inside the
  # container, the source tree is still hot-reloadable from the host
  # while target/ is a clean Linux-native directory shared across all
  # 4 dind containers via Docker's storage backend. Result: cargo's
  # fingerprint cache works correctly and rebuilds noop in < 1s.
  workspace-target:
    name: temps-dev-workspace-target
  # Shared per-container Docker image storage. Each worker gets its own
  # so we don't trip Docker's "can't share /var/lib/docker" rule, but
  # they're named so they survive `down` for fast restarts.
  worker1-docker:
    name: temps-dev-w1-docker
  worker2-docker:
    name: temps-dev-w2-docker
  worker3-docker:
    name: temps-dev-w3-docker
  control-docker:
    name: temps-dev-cp-docker
  # Per-container TEMPS_DATA_DIR (/var/lib/temps). Without a named
  # volume here the container's writable layer is wiped on every
  # `force-recreate` — that means:
  #   - control-plane: fresh encryption_key (invalidates imported
  #     localho.st cert), fresh setup-done marker (re-runs setup, mints
  #     a NEW admin password)
  #   - workers: fresh join-done marker (rejoins cluster as a new node
  #     id, leaks orphan rows into the nodes table)
  # With these volumes everything survives recreates cleanly.
  control-data:
    name: temps-dev-cp-data
  worker1-data:
    name: temps-dev-w1-data
  worker2-data:
    name: temps-dev-w2-data
  worker3-data:
    name: temps-dev-w3-data
  # Workers' /root (/root/.temps holds the agent.json that `temps join`
  # writes; without it the agent has no token after a restart and the
  # container exits in a tight loop).
  worker1-home:
    name: temps-dev-w1-home
  worker2-home:
    name: temps-dev-w2-home
  worker3-home:
    name: temps-dev-w3-home

services:
  postgres:
    image: timescale/timescaledb-ha:pg18
    container_name: temps-dev-postgres
    networks:
      underlay:
        ipv4_address: 10.42.0.5
    environment:
      POSTGRES_DB: temps
      POSTGRES_USER: temps
      POSTGRES_PASSWORD: temps
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres-data:/home/postgres/pgdata
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "temps", "-d", "temps"]
      interval: 2s
      timeout: 2s
      retries: 30

  control-plane:
    build:
      context: .
      dockerfile: Dockerfile.dind-temps
    image: temps-dev-cluster/dind-temps:latest
    container_name: temps-dev-control-plane
    privileged: true
    hostname: control-plane
    # Same cgroupv2 nesting fix as the workers — see worker-1 below.
    cgroup: private
    networks:
      underlay:
        ipv4_address: 10.42.0.10
    ports:
      # Standard ports — production-shaped layout. The localho.st cert
      # imported via tools/dev-cluster/import-localhost-cert.sh covers
      # *.localho.st on port 443; HTTP on :80 redirects to HTTPS as it
      # would in production. Hit https://app.localho.st in a browser.
      - "80:80"
      - "443:443"
    environment:
      TEMPS_DATABASE_URL: postgres://temps:temps@10.42.0.5:5432/temps
      TEMPS_ADDRESS: 0.0.0.0:80
      TEMPS_TLS_ADDRESS: 0.0.0.0:443
      TEMPS_DATA_DIR: /var/lib/temps
      TEMPS_LOG_LEVEL: info
      TEMPS_NETWORK_NAME: temps-app-network
      # Dev cluster serves both HTTP and HTTPS but does NOT redirect
      # HTTP→HTTPS — that lets you hit http://app.localho.st directly
      # (no cert dance) AND still use https://app.localho.st when you
      # want to test cert flows. Once the *.localho.st cert is verified
      # working, you can flip this off to mirror prod behavior.
      TEMPS_DISABLE_HTTPS_REDIRECT: "true"
      ROLE: control-plane
    volumes:
      - ../../:/workspace:rw
      - workspace-target:/workspace/target
      - cargo-cache:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - control-docker:/var/lib/docker
      - control-data:/var/lib/temps
    depends_on:
      postgres:
        condition: service_healthy
    # Start dockerd → build temps if missing → setup --auto → run serve.
    # Everything happens via /workspace/tools/dev-cluster/role-control-plane.sh
    # so we can iterate on the role logic without rebuilding the image.
    command: ["bash", "/workspace/tools/dev-cluster/role-control-plane.sh"]
    # The serve loop blocks; healthcheck just probes it.
    healthcheck:
      # Temps' admin API requires auth on every endpoint; we just probe TCP
      # to know the listener is up. The first boot has to compile the
      # workspace inside the container, which takes 5–10 min on a clean
      # target dir. We give it 15 min via start_period so compose doesn't
      # mark the container unhealthy and starve the workers (which
      # depend_on this service).
      # CMD-SHELL runs through dash on this image, which lacks bash's
      # /dev/tcp builtin — that bug caused the check to fail forever
      # silently. Invoke bash explicitly via the array form so the
      # /dev/tcp probe works as intended. Connect-only, ignore HTTP
      # status: we care that the listener accepts a TCP connection.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/80"]
      interval: 5s
      timeout: 2s
      retries: 60
      start_period: 900s

  worker-1: &worker-template
    build:
      context: .
      dockerfile: Dockerfile.dind-temps
    image: temps-dev-cluster/dind-temps:latest
    container_name: temps-dev-worker-1
    privileged: true
    hostname: worker-1
    # Workers can hit transient failures during boot (control plane
    # mid-startup, postgres still migrating). on-failure makes compose
    # retry instead of leaving the container in `Exited` state forever.
    restart: on-failure:5
    # Give each worker its own cgroup namespace. Required for the
    # inner dockerd (DinD) to manage child cgroups on a cgroupv2 host
    # like Docker Desktop. Without this, every user container deploy
    # fails with:
    #   "cannot enter cgroupv2 /sys/fs/cgroup/docker with domain
    #    controllers -- it is in an invalid state"
    cgroup: private
    networks:
      underlay:
        ipv4_address: 10.42.0.21
    environment:
      ROLE: worker
      WORKER_NAME: worker-1
      WORKER_UNDERLAY_IP: 10.42.0.21
      # Workers reach the control plane over the underlay docker network.
      # Plain HTTP on :80 inside the cluster — no point doing TLS for an
      # internal hop where the proxy already trusts these IPs.
      CONTROL_PLANE_URL: http://10.42.0.10:80
      TEMPS_LOG_LEVEL: info
      TEMPS_NETWORK_NAME: temps-app-network
      TEMPS_OVERLAY_NETWORK: temps0
      TEMPS_AGENT_ADDRESS: 0.0.0.0:3100
    volumes:
      - ../../:/workspace:rw
      - workspace-target:/workspace/target
      - cargo-cache:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - worker1-docker:/var/lib/docker
      - worker1-data:/var/lib/temps
      - worker1-home:/root
    depends_on:
      control-plane:
        condition: service_healthy
    command: ["bash", "/workspace/tools/dev-cluster/role-worker.sh"]

  worker-2:
    <<: *worker-template
    container_name: temps-dev-worker-2
    hostname: worker-2
    networks:
      underlay:
        ipv4_address: 10.42.0.22
    environment:
      ROLE: worker
      WORKER_NAME: worker-2
      WORKER_UNDERLAY_IP: 10.42.0.22
      # Workers reach the control plane over the underlay docker network.
      # Plain HTTP on :80 inside the cluster — no point doing TLS for an
      # internal hop where the proxy already trusts these IPs.
      CONTROL_PLANE_URL: http://10.42.0.10:80
      TEMPS_LOG_LEVEL: info
      TEMPS_NETWORK_NAME: temps-app-network
      TEMPS_OVERLAY_NETWORK: temps0
      TEMPS_AGENT_ADDRESS: 0.0.0.0:3100
    volumes:
      - ../../:/workspace:rw
      - workspace-target:/workspace/target
      - cargo-cache:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - worker2-docker:/var/lib/docker
      - worker2-data:/var/lib/temps
      - worker2-home:/root

  worker-3:
    <<: *worker-template
    container_name: temps-dev-worker-3
    hostname: worker-3
    networks:
      underlay:
        ipv4_address: 10.42.0.23
    environment:
      ROLE: worker
      WORKER_NAME: worker-3
      WORKER_UNDERLAY_IP: 10.42.0.23
      # Workers reach the control plane over the underlay docker network.
      # Plain HTTP on :80 inside the cluster — no point doing TLS for an
      # internal hop where the proxy already trusts these IPs.
      CONTROL_PLANE_URL: http://10.42.0.10:80
      TEMPS_LOG_LEVEL: info
      TEMPS_NETWORK_NAME: temps-app-network
      TEMPS_OVERLAY_NETWORK: temps0
      TEMPS_AGENT_ADDRESS: 0.0.0.0:3100
    volumes:
      - ../../:/workspace:rw
      - workspace-target:/workspace/target
      - cargo-cache:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - worker3-docker:/var/lib/docker
      - worker3-data:/var/lib/temps
      - worker3-home:/root
