[package]
name = "temps-example-plugin"
version = "0.1.0"
edition = "2021"
publish = false
description = "Example external plugin for Temps - demonstrates the plugin SDK"

[[bin]]
name = "temps-example-plugin"
path = "src/main.rs"

[dependencies]
temps-plugin-sdk = { path = "../../crates/temps-plugin-sdk" }

axum = { version = "0.8" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
chrono = { version = "0.4", features = ["serde"] }
