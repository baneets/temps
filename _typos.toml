[default.extend-words]
# Bollard (Docker API client) uses "vertexes" as the field name,
# matching the upstream Go/BuildKit API naming convention.
vertexes = "vertexes"
# Plural of SQL `UNION` — the typos checker tries to "correct" it to
# `UNIONNs`, which is itself a misspelling. Pin both casings.
UNIONs = "UNIONs"
unions = "unions"
# AIMD = Additive Increase / Multiplicative Decrease (congestion-control term,
# ADR-021). typos mis-corrects it to "AIMED".
AIMD = "AIMD"

[default.extend-identifiers]
# W3C traceparent spec example span-id used in test fixtures
# (crates/temps-proxy/src/proxy.rs `extract_traceparent_trace_id` tests).
# Hex string contains "ba" which the spell-checker mistakes for "by"/"be".
"00f067aa0ba902b7" = "00f067aa0ba902b7"
"deadbeef" = "deadbeef"
