name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"
  # Manual dispatch lets us dry-run the pipeline without minting a junk
  # tag. Useful when iterating on the workflow itself or verifying a fix
  # before cutting a real release. The artifact tags include the run id
  # so a manual run can never overwrite a real release artifact.
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run: skip pushes, only build to verify the pipeline works"
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: write
  packages: write

jobs:
  build-web-assets:
    name: Build web assets (WASM + dist)
    # The web console + captcha WASM are pure static output with no
    # platform/arch dependency, but crates/temps-cli/build.rs rebuilds them
    # on every `cargo build --release` invocation. Build them once here and
    # hand the compiled dist/ to each platform job (via SKIP_WEB_BUILD)
    # instead of paying bun install + wasm-pack + rsbuild build 4x — the
    # most expensive repeat was the macOS Intel job's wasm-pack step alone
    # (7m26s on the last release), on top of a redundant rsbuild build in
    # each of the other 3 jobs.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v6
        with:
          path: web/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('web/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install web dependencies
        run: |
          cd web
          bun install

      - name: Install wasm-pack and Build WASM
        run: |
          cargo install wasm-pack
          cd crates/temps-captcha-wasm
          bun run build

      - name: Build web dist
        run: |
          cd web
          bun run build
        env:
          RSBUILD_OUTPUT_PATH: ${{ github.workspace }}/crates/temps-cli/dist
          TEMPS_VERSION: ${{ github.ref_name }}

      - name: Upload web dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: crates/temps-cli/dist
          retention-days: 1

  build-linux-amd64:
    name: Build Linux AMD64
    needs: build-web-assets
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libssl-dev protobuf-compiler

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: linux-amd64-release

      - name: Download web dist artifact
        uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: crates/temps-cli/dist

      - name: Build release binary
        run: cargo build --release --bin temps
        env:
          SKIP_WEB_BUILD: 1
          CARGO_INCREMENTAL: 0
          TEMPS_VERSION: ${{ github.ref_name }}

      - name: Strip binary
        run: strip target/release/temps

      - name: Rename binary
        run: cp target/release/temps temps

      - name: Create tarball
        run: |
          tar -czf temps-linux-amd64.tar.gz temps
          ls -lh temps-linux-amd64.tar.gz

      - name: Generate checksum
        run: |
          sha256sum temps-linux-amd64.tar.gz > temps-linux-amd64.tar.gz.sha256
          cat temps-linux-amd64.tar.gz.sha256

      - name: Get binary info
        run: |
          file temps
          ./temps --version || echo "Note: Binary may require runtime dependencies"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: temps-linux-amd64
          path: |
            temps-linux-amd64.tar.gz
            temps-linux-amd64.tar.gz.sha256

  build-linux-arm64:
    name: Build Linux ARM64
    needs: build-web-assets
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libssl-dev protobuf-compiler

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: linux-arm64-release

      - name: Download web dist artifact
        uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: crates/temps-cli/dist

      - name: Build release binary
        run: cargo build --release --bin temps
        env:
          SKIP_WEB_BUILD: 1
          CARGO_INCREMENTAL: 0
          TEMPS_VERSION: ${{ github.ref_name }}
          # jemalloc bakes max page size at build time; aarch64 kernels vary
          # (4K/16K/64K). lg-page=16 (64K) makes the binary run on all of them.
          JEMALLOC_SYS_WITH_LG_PAGE: 16

      - name: Strip binary
        run: strip target/release/temps

      - name: Rename binary
        run: cp target/release/temps temps

      - name: Create tarball
        run: |
          tar -czf temps-linux-arm64.tar.gz temps
          ls -lh temps-linux-arm64.tar.gz

      - name: Generate checksum
        run: |
          sha256sum temps-linux-arm64.tar.gz > temps-linux-arm64.tar.gz.sha256
          cat temps-linux-arm64.tar.gz.sha256

      - name: Get binary info
        run: |
          file temps
          ./temps --version || echo "Note: Binary may require runtime dependencies"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: temps-linux-arm64
          path: |
            temps-linux-arm64.tar.gz
            temps-linux-arm64.tar.gz.sha256

  build-darwin-amd64:
    name: Build macOS AMD64
    needs: build-web-assets
    # Cross-compiled from Apple Silicon (same host as build-darwin-arm64),
    # not run natively on Intel hardware. GitHub's Intel macOS pool is
    # smaller/older and measured ~2x the wall-clock of the arm64 pool for
    # this job (72m46s vs 40m52s on the last release). x86_64-apple-darwin is
    # a well-supported cross target from an aarch64-apple-darwin host: the
    # same Xcode toolchain/SDK provides both arch slices, and this
    # workspace's native deps (openssl via openssl-src, jemalloc via cc-rs)
    # build from source per-target rather than linking a host-arch system
    # lib, so there's no arch-mismatch risk at link time.
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: darwin-amd64-release

      - name: Install system dependencies
        run: brew install protobuf

      - name: Download web dist artifact
        uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: crates/temps-cli/dist

      - name: Build release binary
        run: cargo build --release --bin temps --target x86_64-apple-darwin
        env:
          SKIP_WEB_BUILD: 1
          CARGO_INCREMENTAL: 0
          TEMPS_VERSION: ${{ github.ref_name }}

      - name: Strip binary
        run: strip target/x86_64-apple-darwin/release/temps

      - name: Rename binary
        run: cp target/x86_64-apple-darwin/release/temps temps

      - name: Create tarball
        run: |
          tar -czf temps-darwin-amd64.tar.gz temps
          ls -lh temps-darwin-amd64.tar.gz

      - name: Generate checksum
        run: |
          shasum -a 256 temps-darwin-amd64.tar.gz > temps-darwin-amd64.tar.gz.sha256
          cat temps-darwin-amd64.tar.gz.sha256

      - name: Get binary info
        run: |
          file temps
          ./temps --version || echo "Note: Binary may require runtime dependencies"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: temps-darwin-amd64
          path: |
            temps-darwin-amd64.tar.gz
            temps-darwin-amd64.tar.gz.sha256

  build-darwin-arm64:
    name: Build macOS ARM64
    needs: build-web-assets
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install system dependencies
        run: brew install protobuf

      - name: Download web dist artifact
        uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: crates/temps-cli/dist

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: darwin-arm64-release

      - name: Build release binary
        run: cargo build --release --bin temps --target aarch64-apple-darwin
        env:
          SKIP_WEB_BUILD: 1
          CARGO_INCREMENTAL: 0
          TEMPS_VERSION: ${{ github.ref_name }}

      - name: Strip binary
        run: strip target/aarch64-apple-darwin/release/temps

      - name: Rename binary
        run: cp target/aarch64-apple-darwin/release/temps temps

      - name: Create tarball
        run: |
          tar -czf temps-darwin-arm64.tar.gz temps
          ls -lh temps-darwin-arm64.tar.gz

      - name: Generate checksum
        run: |
          shasum -a 256 temps-darwin-arm64.tar.gz > temps-darwin-arm64.tar.gz.sha256
          cat temps-darwin-arm64.tar.gz.sha256

      - name: Get binary info
        run: |
          file temps
          ./temps --version || echo "Note: Binary may require runtime dependencies"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: temps-darwin-arm64
          path: |
            temps-darwin-arm64.tar.gz
            temps-darwin-arm64.tar.gz.sha256

  create-release:
    name: Create Release
    needs: [build-linux-amd64, build-linux-arm64, build-darwin-amd64, build-darwin-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      # Single source of truth for "is this a prerelease?" so every downstream
      # job (server image, sandbox images, manifest merge) makes the same
      # channel decision. Prereleases are tags containing a `-` (e.g.
      # `v0.1.0-beta.6`); stable tags look like `v0.1.0`.
      is_prerelease: ${{ steps.channel.outputs.is_prerelease }}
      # The floating channel tag stable -> "latest", prerelease -> "beta".
      # Image jobs append this as an extra tag so operators can pin to a
      # channel ("ghcr.io/.../temps:beta") instead of an exact version.
      channel_tag: ${{ steps.channel.outputs.channel_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Determine release channel
        id: channel
        # Tag pushes: prerelease iff the tag contains a `-` (e.g. `v0.1.0-beta.6`).
        # Manual dispatches: always treated as prerelease so a dry-run or test
        # invocation cannot promote to the stable `:<version>` ref by accident.
        # If you ever need workflow_dispatch to mint a stable build, pass it as
        # an explicit input (and add it to the dispatch inputs above).
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "channel_tag=beta" >> $GITHUB_OUTPUT
            echo "Channel: beta (workflow_dispatch — never promotes to stable)"
          elif [[ "${{ github.ref_name }}" == *"-"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "channel_tag=beta" >> $GITHUB_OUTPUT
            echo "Channel: beta (prerelease)"
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "channel_tag=latest" >> $GITHUB_OUTPUT
            echo "Channel: latest (stable)"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Organize artifacts
        run: |
          mkdir -p release
          cp artifacts/temps-linux-amd64/* release/
          cp artifacts/temps-linux-arm64/* release/
          cp artifacts/temps-darwin-amd64/* release/
          cp artifacts/temps-darwin-arm64/* release/
          ls -lh release/

      - name: Create combined checksums file
        run: |
          cd release
          cat temps-linux-amd64.tar.gz.sha256 > checksums.txt
          cat temps-linux-arm64.tar.gz.sha256 >> checksums.txt
          cat temps-darwin-amd64.tar.gz.sha256 >> checksums.txt
          cat temps-darwin-arm64.tar.gz.sha256 >> checksums.txt
          echo "Combined checksums:"
          cat checksums.txt

      - name: Copy install script to release
        run: |
          cp scripts/install.sh release/install.sh
          chmod +x release/install.sh

      - name: Generate Homebrew formula
        run: |
          # workflow_dispatch runs against a branch, not a tag, so GITHUB_REF
          # is refs/heads/<branch> and the prefix-strip below leaves it
          # untouched -- if the branch name contains a `/` (as most do),
          # that lands in VERSION and breaks the `sed -e "s/.../.../"` call
          # below (VERSION's `/` collides with sed's own delimiter).
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="dryrun-${{ github.run_id }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          SHA256_LINUX_AMD64=$(awk '{print $1}' release/temps-linux-amd64.tar.gz.sha256)
          SHA256_LINUX_ARM64=$(awk '{print $1}' release/temps-linux-arm64.tar.gz.sha256)
          SHA256_DARWIN_AMD64=$(awk '{print $1}' release/temps-darwin-amd64.tar.gz.sha256)
          SHA256_DARWIN_ARM64=$(awk '{print $1}' release/temps-darwin-arm64.tar.gz.sha256)

          echo "Generating Homebrew formula for version $VERSION"
          echo "Linux AMD64 SHA256: $SHA256_LINUX_AMD64"
          echo "Linux ARM64 SHA256: $SHA256_LINUX_ARM64"
          echo "macOS AMD64 SHA256: $SHA256_DARWIN_AMD64"
          echo "macOS ARM64 SHA256: $SHA256_DARWIN_ARM64"

          sed -e "s/{{VERSION}}/$VERSION/g" \
              -e "s/{{SHA256_LINUX_AMD64}}/$SHA256_LINUX_AMD64/g" \
              -e "s/{{SHA256_LINUX_ARM64}}/$SHA256_LINUX_ARM64/g" \
              -e "s/{{SHA256_DARWIN_AMD64}}/$SHA256_DARWIN_AMD64/g" \
              -e "s/{{SHA256_DARWIN_ARM64}}/$SHA256_DARWIN_ARM64/g" \
              scripts/homebrew-formula.rb.template > release/temps.rb

          echo "Generated formula:"
          cat release/temps.rb

      - name: Create release notes file
        run: |
          cat > release/release-notes.md << 'EOF'
          ## Changes

          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ github.ref }}/CHANGELOG.md) for details.

          ## Installation

          ### Quick Install (Recommended)

          **macOS, Linux, and WSL:**
          ```bash
          curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/install.sh | bash
          ```

          ### Homebrew (macOS and Linux)

          ```bash
          # Download formula
          curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/temps.rb -o /tmp/temps.rb

          # Install
          brew install /tmp/temps.rb

          # Verify
          temps --version
          ```

          ### Manual Installation

          #### Linux AMD64
          ```bash
          # Download
          curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/temps-linux-amd64.tar.gz

          # Extract
          tar -xzf temps-linux-amd64.tar.gz

          # Move to PATH
          sudo mv temps /usr/local/bin/temps

          # Verify
          temps --version
          ```

          #### Linux ARM64
          ```bash
          # Download
          curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/temps-linux-arm64.tar.gz

          # Extract
          tar -xzf temps-linux-arm64.tar.gz

          # Move to PATH
          sudo mv temps /usr/local/bin/temps

          # Verify
          temps --version
          ```

          #### macOS AMD64 (Intel)
          ```bash
          # Download
          curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/temps-darwin-amd64.tar.gz

          # Extract
          tar -xzf temps-darwin-amd64.tar.gz

          # Move to PATH
          sudo mv temps /usr/local/bin/temps

          # Verify
          temps --version
          ```

          #### macOS ARM64 (Apple Silicon)
          ```bash
          # Download
          curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/temps-darwin-arm64.tar.gz

          # Extract
          tar -xzf temps-darwin-arm64.tar.gz

          # Move to PATH
          sudo mv temps /usr/local/bin/temps

          # Verify
          temps --version
          ```

          ### Checksums
          ```bash
          # Download checksums
          curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/checksums.txt

          # Verify checksum (Linux/macOS)
          sha256sum -c checksums.txt --ignore-missing
          ```
          EOF

          echo "Release notes created:"
          cat release/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # workflow_dispatch dry-runs must not mint a real Release object
          # under the dispatched branch name — everything above this step
          # (artifact download, formula/checksum/notes generation) still
          # runs and is inspectable in the job logs/artifacts.
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.dry_run }}" == "true" ]]; then
            echo "Dry-run (workflow_dispatch): skipping actual GitHub Release creation for ${{ github.ref_name }}"
            exit 0
          fi

          echo "Creating release ${{ github.ref_name }}..."

          if [[ "${{ steps.channel.outputs.is_prerelease }}" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
            echo "This is a pre-release"
          else
            PRERELEASE_FLAG="--latest"
            echo "This is a stable release"
          fi

          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --notes-file release/release-notes.md \
            $PRERELEASE_FLAG \
            release/temps-linux-amd64.tar.gz \
            release/temps-linux-amd64.tar.gz.sha256 \
            release/temps-linux-arm64.tar.gz \
            release/temps-linux-arm64.tar.gz.sha256 \
            release/temps-darwin-amd64.tar.gz \
            release/temps-darwin-amd64.tar.gz.sha256 \
            release/temps-darwin-arm64.tar.gz \
            release/temps-darwin-arm64.tar.gz.sha256 \
            release/checksums.txt \
            release/install.sh \
            release/temps.rb

          echo ""
          echo "✓ Release ${{ github.ref_name }} created successfully!"
          echo ""
          echo "View release at: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"

  build-and-push-docker:
    name: Build and Push Docker Image (${{ matrix.platform }})
    needs: [build-linux-amd64, build-linux-arm64, build-darwin-amd64, build-darwin-arm64, create-release]
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            artifact: temps-linux-amd64
            tarball: temps-linux-amd64.tar.gz
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            artifact: temps-linux-arm64
            tarball: temps-linux-arm64.tar.gz
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Download binary artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact }}
          path: artifacts

      - name: Extract binary
        run: |
          cd artifacts
          tar -xzf ${{ matrix.tarball }}
          chmod +x temps
          ls -lh temps
          file temps

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          # See the matching comment in create-release's "Generate Homebrew
          # formula" step: workflow_dispatch runs against a branch ref, so
          # this would otherwise leave a `/`-containing string in VERSION,
          # which is invalid in a Docker tag component.
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="dryrun-${{ github.run_id }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Extract platform tag
        id: platform_tag
        run: |
          PLATFORM_TAG=$(echo "${{ matrix.platform }}" | sed 's/\//-/g')
          echo "tag=$PLATFORM_TAG" >> $GITHUB_OUTPUT
          echo "Platform tag: $PLATFORM_TAG"

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.release
          platforms: ${{ matrix.platform }}
          # Dry-run: build but don't push. Same guard used by the sandbox
          # and preview-gateway image jobs below — without it, every
          # workflow_dispatch (dry-run or not) overwrites the real
          # `:beta-<platform>` tags, which create-docker-manifest then
          # merges into the `:beta` channel operators pin to.
          push: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run != true }}
          # Per-platform intermediate tags. The manifest-merge job below
          # combines amd64+arm64 into the final multi-arch refs. Channel tag
          # (`latest` for stable, `beta` for prereleases) keeps stable users
          # from being upgraded by a beta release that happens to land later.
          tags: |
            ghcr.io/${{ github.repository_owner }}/temps:${{ needs.create-release.outputs.channel_tag }}-${{ steps.platform_tag.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/temps:${{ steps.version.outputs.version }}-${{ steps.platform_tag.outputs.tag }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.title=Temps
            org.opencontainers.image.description=Open-source platform for deploying and managing applications
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-docker-manifest:
    name: Create Docker Manifest
    needs: [build-and-push-docker, create-release]
    # Merges per-platform tags that build-and-push-docker only pushes on a
    # real run. On a workflow_dispatch dry-run those source tags don't
    # exist, so skip the merge too (would otherwise fail on a missing tag).
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run != true }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          # See the matching comment in create-release's "Generate Homebrew
          # formula" step: workflow_dispatch runs against a branch ref, so
          # this would otherwise leave a `/`-containing string in VERSION,
          # which is invalid in a Docker tag component.
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="dryrun-${{ github.run_id }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      # Merge per-platform tags into a multi-arch manifest under the channel
      # ref (`:latest` for stable, `:beta` for prereleases). Operators that
      # pin to `:latest` never receive a prerelease build by accident.
      - name: Create and push manifest for channel
        run: |
          CHANNEL="${{ needs.create-release.outputs.channel_tag }}"
          docker buildx imagetools create -t ghcr.io/${{ github.repository_owner }}/temps:$CHANNEL \
            ghcr.io/${{ github.repository_owner }}/temps:$CHANNEL-linux-amd64 \
            ghcr.io/${{ github.repository_owner }}/temps:$CHANNEL-linux-arm64

      - name: Create and push manifest for version
        run: |
          docker buildx imagetools create -t ghcr.io/${{ github.repository_owner }}/temps:${{ steps.version.outputs.version }} \
            ghcr.io/${{ github.repository_owner }}/temps:${{ steps.version.outputs.version }}-linux-amd64 \
            ghcr.io/${{ github.repository_owner }}/temps:${{ steps.version.outputs.version }}-linux-arm64

  # ─────────────────────────────────────────────────────────────────────────
  # Sandbox images and preview gateway
  #
  # Published to ghcr.io on every release tag (v*.*.*). The sandbox image
  # version that the running temps server expects is pinned via
  # `SANDBOX_IMAGE_VERSION` in crates/temps-agents/src/sandbox/docker.rs —
  # bumping that constant is what causes hosts to pull a new image, since
  # `docker inspect` short-circuits cached `:latest` tags. We tag both
  # `:<SANDBOX_IMAGE_VERSION>` (the immutable tag the runtime pulls) and
  # `:latest` (operator convenience).
  # ─────────────────────────────────────────────────────────────────────────
  # ─────────────────────────────────────────────────────────────────────
  # Compile helpers + render every per-runtime Dockerfile + materialise
  # the shared bundle, ONCE. The matrix below depends on this — was
  # being repeated 6× in parallel across the matrix.
  # ─────────────────────────────────────────────────────────────────────
  prepare-sandbox-context:
    name: Prepare sandbox build context
    needs: [create-release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      sandbox_image_version: ${{ steps.version.outputs.sandbox_image_version }}
      gateway_version: ${{ steps.version.outputs.gateway_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo deps
        uses: Swatinem/rust-cache@v2
        with:
          key: sandbox-image-builder

      - name: Build helpers (print_dockerfile + print_bundle)
        # Single source of truth: same examples the runtime ships use of.
        # `pty_agent_bundle::BUNDLE` and `git_credential_bundle::BUNDLE`
        # are linked into both, so what we materialise here is exactly
        # what `temps serve` would tar at runtime.
        run: |
          cargo build \
            --example print_dockerfile \
            --example print_bundle \
            -p temps-agents

      - name: Extract versions
        id: version
        run: |
          IMAGE_VERSION=$(grep -E '^pub const SANDBOX_IMAGE_VERSION' \
            crates/temps-agents/src/sandbox/docker.rs \
            | sed -E 's/.*"([^"]+)".*/\1/')
          if [ -z "$IMAGE_VERSION" ]; then
            echo "::error::Failed to extract SANDBOX_IMAGE_VERSION from docker.rs"
            exit 1
          fi
          echo "sandbox_image_version=$IMAGE_VERSION" >> $GITHUB_OUTPUT

          GATEWAY_VERSION=$(grep -E '^version = ' \
            crates/temps-preview-gateway/Cargo.standalone.toml \
            | head -n 1 \
            | sed -E 's/.*"([^"]+)".*/\1/')
          if [ -z "$GATEWAY_VERSION" ]; then
            echo "::error::Failed to extract preview gateway version"
            exit 1
          fi
          echo "gateway_version=$GATEWAY_VERSION" >> $GITHUB_OUTPUT

          echo "Sandbox image version: $IMAGE_VERSION"
          echo "Gateway version:       $GATEWAY_VERSION"

      - name: Render Dockerfiles for every runtime
        run: |
          mkdir -p sandbox-context/dockerfiles
          for runtime in node bun python rust go full; do
            ./target/debug/examples/print_dockerfile "$runtime" \
              > "sandbox-context/dockerfiles/$runtime.Dockerfile"
            echo "  rendered: $runtime"
          done

      - name: Materialise bundles into shared build context
        run: |
          mkdir -p sandbox-context/bundle
          ./target/debug/examples/print_bundle sandbox-context/bundle
          echo "Bundle layout:"
          find sandbox-context/bundle -type f | sort

      - name: Upload sandbox build context
        uses: actions/upload-artifact@v7
        with:
          name: sandbox-context
          path: sandbox-context/
          retention-days: 1

  build-and-push-sandbox-images:
    name: Build sandbox image (${{ matrix.runtime }})
    needs: [create-release, prepare-sandbox-context]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        runtime: [node, bun, python, rust, go, full]
    env:
      # Channel decided once in `create-release`; reused here so beta tags
      # never get pushed to the stable `:latest` ref.
      CHANNEL_TAG: ${{ needs.create-release.outputs.channel_tag }}
      IS_PRERELEASE: ${{ needs.create-release.outputs.is_prerelease }}
    steps:
      - name: Download prepared context
        uses: actions/download-artifact@v8
        with:
          name: sandbox-context
          path: sandbox-context

      - name: Assemble per-runtime build context
        # `docker buildx build` wants a single directory: this runtime's
        # rendered Dockerfile + the materialised bundle, side by side.
        run: |
          mkdir -p build-context
          cp -r sandbox-context/bundle/. build-context/
          cp "sandbox-context/dockerfiles/${{ matrix.runtime }}.Dockerfile" \
             build-context/Dockerfile
          echo "Build context layout:"
          find build-context -maxdepth 2 | sort

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Compose channel-aware tag list. Stable releases own the canonical
      # `:<sandbox_version>` ref + `:latest` + `:stable`; beta releases
      # publish only suffixed refs (`:<sandbox_version>-beta`, `:beta`) so a
      # beta Dockerfile change cannot overwrite the stable image at the same
      # `SANDBOX_IMAGE_VERSION`. The `:<sha>` tag is always pushed for
      # forensic traceability.
      - name: Compose tag list
        id: tags
        run: |
          REPO="ghcr.io/${{ github.repository_owner }}/temps-sandbox-${{ matrix.runtime }}"
          VER="${{ needs.prepare-sandbox-context.outputs.sandbox_image_version }}"
          SHA="${{ github.sha }}"
          {
            echo "list<<TAGS_EOF"
            echo "$REPO:$SHA"
            if [[ "$IS_PRERELEASE" == "true" ]]; then
              echo "$REPO:${VER}-beta"
              echo "$REPO:beta"
            else
              echo "$REPO:$VER"
              echo "$REPO:${VER}-stable"
              echo "$REPO:latest"
              echo "$REPO:stable"
            fi
            echo "TAGS_EOF"
          } >> $GITHUB_OUTPUT

          echo "Channel: $CHANNEL_TAG (prerelease=$IS_PRERELEASE)"
          echo "Will push:"
          if [[ "$IS_PRERELEASE" == "true" ]]; then
            echo "  $REPO:$SHA"
            echo "  $REPO:${VER}-beta"
            echo "  $REPO:beta"
          else
            echo "  $REPO:$SHA"
            echo "  $REPO:$VER"
            echo "  $REPO:${VER}-stable"
            echo "  $REPO:latest"
            echo "  $REPO:stable"
          fi

      - name: Build and push sandbox image
        uses: docker/build-push-action@v7
        with:
          context: ./build-context
          platforms: linux/amd64,linux/arm64
          # Dry-run: build but don't push. Used by `workflow_dispatch` with
          # `dry_run=true` to verify the pipeline works without polluting
          # the registry. Real tag pushes always push.
          push: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run != true }}
          tags: ${{ steps.tags.outputs.list }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.prepare-sandbox-context.outputs.sandbox_image_version }}
            org.opencontainers.image.title=temps-sandbox-${{ matrix.runtime }}
            org.opencontainers.image.description=Temps workspace sandbox image (${{ matrix.runtime }} runtime)
          cache-from: type=gha,scope=sandbox-${{ matrix.runtime }}
          cache-to: type=gha,scope=sandbox-${{ matrix.runtime }},mode=max

  build-and-push-preview-gateway:
    name: Build preview gateway image
    needs: [create-release, prepare-sandbox-context]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IS_PRERELEASE: ${{ needs.create-release.outputs.is_prerelease }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Same channel-aware tag composition as the sandbox images: stable
      # owns canonical refs, beta only suffixed refs. Without this, every
      # release (including pre-releases) overwrites `:<version>` and
      # `:latest`, defeating the channel split.
      - name: Compose tag list
        id: tags
        run: |
          REPO="ghcr.io/${{ github.repository_owner }}/temps-preview-gateway"
          VER="${{ needs.prepare-sandbox-context.outputs.gateway_version }}"
          SHA="${{ github.sha }}"
          {
            echo "list<<TAGS_EOF"
            echo "$REPO:$SHA"
            if [[ "$IS_PRERELEASE" == "true" ]]; then
              echo "$REPO:${VER}-beta"
              echo "$REPO:beta"
            else
              echo "$REPO:$VER"
              echo "$REPO:${VER}-stable"
              echo "$REPO:latest"
              echo "$REPO:stable"
            fi
            echo "TAGS_EOF"
          } >> $GITHUB_OUTPUT

      - name: Build and push preview gateway image
        uses: docker/build-push-action@v7
        with:
          context: ./crates/temps-preview-gateway
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run != true }}
          tags: ${{ steps.tags.outputs.list }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.prepare-sandbox-context.outputs.gateway_version }}
            org.opencontainers.image.title=temps-preview-gateway
            org.opencontainers.image.description=Temps preview gateway — routes ws-<sid>-<port> hosts to sandbox containers
          cache-from: type=gha,scope=preview-gateway
          cache-to: type=gha,scope=preview-gateway,mode=max
