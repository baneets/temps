version: 2

updates:
  # Rust workspace (51 crates under a single Cargo.lock at the repo root).
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "rust"
    ignore:
      # Keep sqlx aligned with sea-orm 1.1 (which requires sqlx ^0.8). A minor
      # bump to 0.9 splits the graph into two sqlx versions, and 0.9's
      # SqlSafeStr guard breaks our dynamic queries. Patch bumps within 0.8 are
      # still allowed. Revisit when we move to sea-orm 2.0 (stable).
      - dependency-name: "sqlx"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-major"
      # sea-orm 2.0 (major) is still pre-release and pulls sqlx 0.9; hold on 1.1.
      - dependency-name: "sea-orm"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "sea-orm-migration"
        update-types:
          - "version-update:semver-major"
      # sea-schema minor/major bumps drift ahead of the pinned sea-orm line.
      - dependency-name: "sea-schema"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-major"
      # aws-config 1.8.17 / aws-sdk-s3 1.134.0 pin aws-smithy-schema ^0.1.0. A
      # minor bump of these smithy crates pulls aws-smithy-schema 0.2.0 and
      # breaks aws-config's compile (SharedClientProtocol type mismatch).
      - dependency-name: "aws-smithy-runtime"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-major"
      - dependency-name: "aws-types"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-major"
    groups:
      # Patch/minor bumps are low-risk and numerous across 51 crates; batching
      # them into one PR keeps the review queue sane. Majors are left
      # ungrouped so each gets its own PR and full CI signal, since majors
      # are the ones most likely to need an actual code change.
      cargo-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Web frontend (web/). Package manager is bun (web/bun.lock present, no
  # package-lock.json/yarn.lock/pnpm-lock.yaml) per CLAUDE.md, which is why
  # this uses the "bun" ecosystem (GA since Feb 2025) rather than "npm".
  - package-ecosystem: "bun"
    directory: "/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "web"
    groups:
      web-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used across .github/workflows/*.yml (including this PR's
  # new dependency-scan.yml).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "ci"
    groups:
      github-actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
